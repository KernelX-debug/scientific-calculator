<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Calculadora Científica</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Consolas, monospace;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#0f0f0f;
overflow:hidden;
color:white;
}

/* fondo matemático */

canvas{
position:fixed;
top:0;
left:0;
z-index:0;
}

/* calculadora */

.calculadora{
position:relative;
z-index:2;
background:rgba(30,30,30,0.95);
padding:25px;
border-radius:15px;
box-shadow:0 0 30px rgba(0,0,0,0.8);
width:360px;
backdrop-filter:blur(8px);
}

.pantalla{
background:black;
color:#00ff9c;
font-size:28px;
text-align:right;
padding:15px;
border-radius:10px;
margin-bottom:15px;
overflow:hidden;
box-shadow:0 0 10px #00ff9c inset;
}

.botones{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:10px;
}

button{
padding:15px;
border:none;
border-radius:8px;
font-size:16px;
cursor:pointer;
transition:0.2s;
}

.numero{
background:#333;
color:white;
}

.numero:hover{
background:#444;
transform:scale(1.05);
}

.operador{
background:#0e639c;
color:white;
}

.operador:hover{
background:#1177bb;
}

.cientifico{
background:#6b4fd3;
color:white;
}

.cientifico:hover{
background:#7d60e3;
}

.igual{
background:#16c784;
grid-column:span 5;
font-size:18px;
}

.igual:hover{
background:#1fdc90;
}

.borrar{
background:#c42b2b;
}

.borrar:hover{
background:#e03c3c;
}

</style>
</head>

<body>

<canvas id="fondo"></canvas>

<div class="calculadora">

<div class="pantalla" id="pantalla">0</div>

<div class="botones">

<button class="borrar" onclick="limpiar()">C</button>
<button class="cientifico" onclick="sqrt()">√</button>
<button class="cientifico" onclick="potencia()">x²</button>
<button class="cientifico" onclick="sin()">sin</button>
<button class="cientifico" onclick="cos()">cos</button>

<button class="cientifico" onclick="tan()">tan</button>
<button class="cientifico" onclick="log()">log</button>
<button class="cientifico" onclick="pi()">π</button>
<button class="operador" onclick="agregar('/')">÷</button>
<button class="operador" onclick="agregar('*')">×</button>

<button class="numero" onclick="agregar('7')">7</button>
<button class="numero" onclick="agregar('8')">8</button>
<button class="numero" onclick="agregar('9')">9</button>
<button class="operador" onclick="agregar('-')">−</button>
<button class="operador" onclick="agregar('+')">+</button>

<button class="numero" onclick="agregar('4')">4</button>
<button class="numero" onclick="agregar('5')">5</button>
<button class="numero" onclick="agregar('6')">6</button>
<button class="numero" onclick="agregar('1')">1</button>
<button class="numero" onclick="agregar('2')">2</button>

<button class="numero" onclick="agregar('3')">3</button>
<button class="numero" onclick="agregar('0')">0</button>
<button class="numero" onclick="agregar('.')">.</button>

<button class="igual" onclick="calcular()">=</button>

</div>

</div>

<script>

/* pantalla */

let pantalla=document.getElementById("pantalla");

/* agregar números */

function agregar(valor){
if(pantalla.innerText==="0"){
pantalla.innerText=valor;
}else{
pantalla.innerText+=valor;
}
}

/* limpiar */

function limpiar(){
pantalla.innerText="0";
}

/* operaciones básicas */

function calcular(){
try{
pantalla.innerText=eval(pantalla.innerText);
}catch{
pantalla.innerText="Error";
}
}

/* funciones científicas */

function sqrt(){
pantalla.innerText=Math.sqrt(parseFloat(pantalla.innerText));
}

function potencia(){
pantalla.innerText=Math.pow(parseFloat(pantalla.innerText),2);
}

function sin(){
let g = parseFloat(pantalla.innerText);
let r = g * Math.PI / 180;
pantalla.innerText = Math.sin(r);
}

function cos(){
let g = parseFloat(pantalla.innerText);
let r = g * Math.PI / 180;
pantalla.innerText = Math.cos(r);
}

function tan(){
let g = parseFloat(pantalla.innerText);
let r = g * Math.PI / 180;
pantalla.innerText = Math.tan(r);
}

function log(){
pantalla.innerText=Math.log10(parseFloat(pantalla.innerText));
}

function pi(){
pantalla.innerText=Math.PI;
}

/* fondo matemático */

const canvas=document.getElementById("fondo");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

const simbolos=["π","√x","∑","∫","sin","cos","tan","log","x²","∞","Δ"];

let elementos=[];

for(let i=0;i<40;i++){
elementos.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
texto:simbolos[Math.floor(Math.random()*simbolos.length)],
velocidad:0.3+Math.random()*0.5
});
}

function animar(){

ctx.clearRect(0,0,canvas.width,canvas.height);

ctx.fillStyle="rgba(255,255,255,0.07)";
ctx.font="20px monospace";

elementos.forEach(e=>{

ctx.fillText(e.texto,e.x,e.y);

e.y-=e.velocidad;

if(e.y<0){
e.y=canvas.height;
}

});

requestAnimationFrame(animar);

}

animar();

</script>

</body>
</html>
